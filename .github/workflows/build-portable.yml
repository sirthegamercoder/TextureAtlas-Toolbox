name: Build Portable Distributions

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.14'
  EMBEDDED_PYTHON_VERSION: '3.14.5'
  PYTHONUNBUFFERED: '1'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Get app version
        id: version
        shell: bash
        run: |
          VERSION=$(grep 'APP_VERSION' src/utils/version.py | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build portable distribution
        run: python setup/build_portable.py --python-version ${{ env.EMBEDDED_PYTHON_VERSION }} --no-archive

      - name: Upload Windows distribution
        uses: actions/upload-artifact@v7.0.1
        with:
          name: TextureAtlasToolbox-win-x64-embedded-python-v${{ steps.version.outputs.version }}
          path: _build-output/portable/TextureAtlas Toolbox/
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'APP_VERSION' src/utils/version.py | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0

      - name: Build portable distribution
        run: python setup/build_portable.py --python-version ${{ env.EMBEDDED_PYTHON_VERSION }} --no-archive

      - name: Verify bundled setup.sh syntax
        run: |
          set -e
          DIST="_build-output/portable/TextureAtlas Toolbox"
          test -f "$DIST/setup.sh" || { echo "setup.sh missing in distribution"; exit 1; }
          bash -n "$DIST/setup.sh"
          echo "setup.sh OK"

      - name: Upload Linux distribution
        uses: actions/upload-artifact@v7.0.1
        with:
          name: TextureAtlasToolbox-linux-x64-embedded-python-v${{ steps.version.outputs.version }}
          path: _build-output/portable/TextureAtlas Toolbox/
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'APP_VERSION' src/utils/version.py | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build portable distribution
        run: python setup/build_portable.py --python-version ${{ env.EMBEDDED_PYTHON_VERSION }} --no-archive

      - name: Verify bundled setup.sh syntax
        run: |
          set -e
          DIST="_build-output/portable/TextureAtlas Toolbox"
          test -f "$DIST/setup.sh" || { echo "setup.sh missing in distribution"; exit 1; }
          bash -n "$DIST/setup.sh"
          echo "setup.sh OK"

      - name: Upload macOS distribution
        uses: actions/upload-artifact@v7.0.1
        with:
          name: TextureAtlasToolbox-mac-x64-embedded-python-v${{ steps.version.outputs.version }}
          path: _build-output/portable/TextureAtlas Toolbox/
          if-no-files-found: error
