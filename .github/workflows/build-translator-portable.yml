name: Build Translation Editor Portable

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.14'
  EMBEDDED_PYTHON_VERSION: '3.14.5'
  PYTHONUNBUFFERED: '1'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tools/translator-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Get app version
        id: version
        shell: bash
        working-directory: .
        run: |
          VERSION=$(grep 'setApplicationVersion' tools/translator-app/src/Main.py | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build portable distribution
        run: python setup/build_portable.py --python-version ${{ env.EMBEDDED_PYTHON_VERSION }} --no-archive

      - name: Upload Windows distribution
        uses: actions/upload-artifact@v7.0.1
        with:
          name: TranslationEditor-win-x64-embedded-python-v${{ steps.version.outputs.version }}
          path: tools/translator-app/_build-output/portable/Translation Editor/
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/translator-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Get app version
        id: version
        working-directory: .
        run: |
          VERSION=$(grep 'setApplicationVersion' tools/translator-app/src/Main.py | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0

      - name: Build portable distribution
        run: python setup/build_portable.py --python-version ${{ env.EMBEDDED_PYTHON_VERSION }} --no-archive

      - name: Upload Linux distribution
        uses: actions/upload-artifact@v7.0.1
        with:
          name: TranslationEditor-linux-x64-embedded-python-v${{ steps.version.outputs.version }}
          path: tools/translator-app/_build-output/portable/Translation Editor/
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: tools/translator-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Get app version
        id: version
        working-directory: .
        run: |
          VERSION=$(grep 'setApplicationVersion' tools/translator-app/src/Main.py | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build portable distribution
        run: python setup/build_portable.py --python-version ${{ env.EMBEDDED_PYTHON_VERSION }} --no-archive

      - name: Upload macOS distribution
        uses: actions/upload-artifact@v7.0.1
        with:
          name: TranslationEditor-mac-x64-embedded-python-v${{ steps.version.outputs.version }}
          path: tools/translator-app/_build-output/portable/Translation Editor/
          if-no-files-found: error
